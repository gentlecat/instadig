name: Create and publish a Docker image

on:
  push:
    branches: ['main']
  pull_request:

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: amd64
          - platform: linux/arm64
            arch: arm64
            runner: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to local registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.FORGEJO_DOMAIN }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Log in to Codeberg
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: r1
          password: ${{ secrets.CODEBERG_TOKEN }}

      # Builds on the runner's native architecture (no emulation).
      # On pull requests this builds but does not push (dry run).
      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.FORGEJO_DOMAIN }}/${{ github.repository_owner }}/instadig:${{ matrix.arch }}
            codeberg.org/r1/instadig:${{ matrix.arch }}

  merge:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: amd64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.FORGEJO_DOMAIN }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Log in to Codeberg
        uses: docker/login-action@v3
        with:
          registry: codeberg.org
          username: r1
          password: ${{ secrets.CODEBERG_TOKEN }}

      - name: Create multi-arch manifests
        shell: bash
        run: |
          for img in "${{ vars.FORGEJO_DOMAIN }}/${{ github.repository_owner }}/instadig" "codeberg.org/r1/instadig"; do
            docker buildx imagetools create -t "$img:latest" "$img:amd64" "$img:arm64"
          done
